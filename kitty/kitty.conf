# Aurora Kitty Configuration
# Based on rafalbromirski/vim-aurora theme

# Font configuration
font_family      Monaco
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Cursor
cursor                  #ff4040
cursor_text_color       #1b1b24
cursor_shape            block
cursor_blink_interval   0

# Scrollback
scrollback_lines        10000

# Mouse
mouse_hide_wait         3.0
url_color               #31baff
url_style               curly

# Window
window_padding_width    8
hide_window_decorations no
confirm_os_window_close 0

# Tab bar
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #1b1b24
active_tab_background   #9d8cff
active_tab_font_style   bold
inactive_tab_foreground #69697c
inactive_tab_background #262631
inactive_tab_font_style normal
tab_bar_background      #0b0b14

# ===== Aurora Color Scheme =====

# Background and foreground
foreground              #cfcfdd
background              #1b1b24
selection_foreground    #1b1b24
selection_background    #9d8cff

# Cursor colors
cursor                  #ff4040
cursor_text_color       #1b1b24

# URL underline color
url_color               #31baff

# Kitty window border colors
active_border_color     #9d8cff
inactive_border_color   #262631
bell_border_color       #ff9326

# Mark colors (for marking text)
mark1_foreground        #1b1b24
mark1_background        #31baff
mark2_foreground        #1b1b24
mark2_background        #9d8cff
mark3_foreground        #1b1b24
mark3_background        #18ffe0

# ANSI Colors (Aurora)

# Black
color0                  #000000
color8                  #69697c

# Red
color1                  #ff4040
color9                  #ff4040

# Green
color2                  #9ceb4f
color10                 #9ceb4f

# Yellow
color3                  #ffcb65
color11                 #ffcb65

# Blue
color4                  #31baff
color12                 #31baff

# Magenta/Purple
color5                  #9d8cff
color13                 #9d8cff

# Cyan/Aqua
color6                  #18ffe0
color14                 #18ffe0

# White
color7                  #cfcfdd
color15                 #ffffff

# macOS specific
macos_titlebar_color            #0b0b14
macos_option_as_alt             yes
macos_quit_when_last_window_closed yes
macos_thicken_font              0
