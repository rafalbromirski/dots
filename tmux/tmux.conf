# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# do not use mouse
set -g mouse off

# turn on focus events (for n/vim autosave)
set -g focus-events on

# save current path when open new panes
bind-key c new-window -c "#{pane_current_path}"

# split window
bind-key h split-window -h -c "#{pane_current_path}"
bind-key v split-window -v -c "#{pane_current_path}"

# switch panes using alt+arrow without prefix
bind -n C-j select-pane -t :.+
bind -n C-k select-pane -t :.-

unbind-key -n Escape

# reload tmux config file
# ctrl+b alt+r (M = alt)

bind M-r \
  source-file ~/.tmux.conf \;\
  display-message "reLoad ~/.tmux.conf"

bind M-w \
  move-window -r \;\
  display-message "reEnumerating windows..."

# windows
set -w -g window-status-current-format " #[bold]#I:#W#F "
set -w -g window-status-format " #I:#W#F "
set -w -g alternate-screen on

# fix colors for true color support
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",*256col*:RGB"

# ===== Aurora Theme =====
# Based on rafalbromirski/vim-aurora

# Colors
%hidden AURORA_BG="#1b1b24"
%hidden AURORA_BG_DARK="#0b0b14"
%hidden AURORA_BG_LIGHT="#262631"
%hidden AURORA_FG="#cfcfdd"
%hidden AURORA_FG_DIM="#69697c"
%hidden AURORA_RED="#ff4040"
%hidden AURORA_GREEN="#9ceb4f"
%hidden AURORA_YELLOW="#ffcb65"
%hidden AURORA_BLUE="#31baff"
%hidden AURORA_PURPLE="#9d8cff"
%hidden AURORA_AQUA="#18ffe0"

# Status bar
set -g status-position bottom
set -g status-style "bg=#{AURORA_BG_DARK} fg=#{AURORA_FG}"
set -g status-left-length 50
set -g status-right-length 100

# Status left (session info)
set -g status-left "#[bg=#{AURORA_PURPLE},fg=#{AURORA_BG_DARK},bold] #S #[bg=#{AURORA_BG_DARK},fg=#{AURORA_PURPLE}]"

# Status right (time)
set -g status-right "#[fg=#{AURORA_FG_DIM}]%Y-%m-%d #[fg=#{AURORA_AQUA}]%H:%M #[bg=#{AURORA_AQUA},fg=#{AURORA_BG_DARK},bold] #H "

# Window tabs
set -g window-status-format "#[fg=#{AURORA_FG_DIM}] #I:#W "
set -g window-status-current-format "#[bg=#{AURORA_BG_LIGHT},fg=#{AURORA_PURPLE},bold] #I:#W #[fg=#{AURORA_YELLOW}]#F "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#{AURORA_BG_LIGHT}"
set -g pane-active-border-style "fg=#{AURORA_PURPLE}"

# Message styling
set -g message-style "bg=#{AURORA_BG_LIGHT} fg=#{AURORA_FG}"
set -g message-command-style "bg=#{AURORA_BG_LIGHT} fg=#{AURORA_FG}"

# Mode styling (copy-mode, etc)
set -g mode-style "bg=#{AURORA_PURPLE} fg=#{AURORA_BG_DARK}"

# Clock
set -g clock-mode-colour "#31baff"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
